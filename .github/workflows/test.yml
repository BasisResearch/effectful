name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: 
      - master
      - 'staging-*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["'<3.13'", "'3.13'"]
        test-group:
          - name: indexed
            paths: tests/test_handlers_indexed*.py
          - name: torch-pyro
            paths: tests/test_handlers_torch*.py tests/test_handlers_pyro*.py
          - name: jax-numpyro
            paths: tests/test_handlers_jax*.py tests/test_handlers_numpyro*.py
          - name: llm
            paths: tests/test_handlers_llm*.py
          - name: examples
            paths: tests/test_examples_*.py
          - name: core
            paths: effectful/ tests/test_ops_*.py tests/test_internals_*.py
    name: "${{ matrix.test-group.name }} (py ${{ matrix.python-version }})"
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install pandoc
        run: |
          sudo apt install -y pandoc

      - name: Install Python dependencies
        run: |
          uv sync --all-extras --dev --python ${{ matrix.python-version }}
          
      - name: Run tests
        env:
          MKL_NUM_THREADS: 1
        run: uv run pytest ${{ matrix.test-group.paths }} -n auto
