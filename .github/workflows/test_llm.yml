name: LLM Integration Tests

on:
  pull_request:
    branches: 
      - master
      - 'staging-*'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  test-llm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["'3.13'"]
        model: ["gpt-4o-mini"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install Python dependencies
        run: |
          uv sync --all-extras --dev --python ${{ matrix.python-version }}

      - name: Run LLM integration tests
        env:
          EFFECTFUL_LLM_MODEL: ${{ matrix.model }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run pytest tests/test_handlers_llm_provider.py tests/test_handlers_llm_tool_calling_poem.py tests/test_handlers_llm_tool_calling_book.py -v --tb=short
